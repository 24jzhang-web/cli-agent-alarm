name: Bug report
description: Report a problem with Codex Alarm
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, terminal app, Codex CLI version, install method, and whether terminal-notifier is installed.
      render: text
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `~/.codex/alarm/alarm doctor` output. Remove private paths if needed.
      render: text
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: How can we reproduce it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Report safety
      options:
        - label: I removed tokens, private prompts, and sensitive local paths from this report.
          required: true
