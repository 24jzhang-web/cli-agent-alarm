name: Feature request
description: Suggest an improvement for Codex Alarm
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Codex Alarm do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Lightweight alternative
      description: Is there a smaller docs, config, or workflow change that would solve this?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Keep v1 lightweight
        - Later-version feature
        - Not sure
    validations:
      required: true
